# ─── Render.com Blueprint — KAIROS LiteLLM Proxy ─────────────────────────────
# Deploy: connect your GitHub repo to Render and it will auto-detect this file.
# Docs: https://render.com/docs/blueprint-spec
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: kairos-litellm
    runtime: docker
    plan: free                     # Render free tier (750 hrs/month)
    region: singapore              # Closest free region to India
    branch: main
    dockerContext: .               # Repo root — so COPY litellm/... works
    dockerfilePath: ./litellm/Dockerfile

    # ── Health check ──────────────────────────────────────────────────────────
    healthCheckPath: /health

    # ── Auto-deploy on push ───────────────────────────────────────────────────
    autoDeploy: true

    # ── Environment Variables ──────────────────────────────────────────────────
    # Set the values manually in the Render dashboard (Environment tab).
    # "sync: false" means Render won't auto-generate a value — you must paste it.
    envVars:
      # ── LiteLLM security ────────────────────────────────────────────────────
      - key: LITELLM_MASTER_KEY
        sync: false

      # ── OpenRouter keys (free tier only) ────────────────────────────────────
      - key: OPENROUTER_API_KEY_1
        sync: false                # paste your key in Render dashboard

      - key: OPENROUTER_API_KEY_2
        sync: false

      - key: OPENROUTER_API_KEY_3
        sync: false

      - key: OPENROUTER_API_KEY_4
        sync: false

      - key: OPENROUTER_API_KEY_5
        sync: false

      # ── Groq key (all Groq models) ───────────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false

      - key: MISTRAL_API_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false

      - key: GITHUB_API_KEY
        sync: false

      # ── Python tuning ────────────────────────────────────────────────────────
      - key: PYTHONUNBUFFERED
        value: "1"

      - key: MALLOC_ARENA_MAX
        value: "2"

      - key: PORT
        value: "4000"
