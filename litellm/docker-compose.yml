services:
  litellm:
    build: .
    container_name: antigravity-litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    healthcheck:
      test: ["CMD", "curl", "-f", "https://kairos-litellm.onrender.com/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

