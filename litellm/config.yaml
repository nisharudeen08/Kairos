model_list:

  # ── ALL ON WINDOWS via Cloudflare Tunnel ──────────

  - model_name: "gemma-local-fast"
    litellm_params:
      model: "ollama/gemma:2b"
      api_base: "https://vessel-dicke-theorem-levitra.trycloudflare.com"
      timeout: 60

  - model_name: "qwen-coder-win"
    litellm_params:
      model: "ollama/qwen2.5-coder:7b"
      api_base: "https://vessel-dicke-theorem-levitra.trycloudflare.com"
      timeout: 120

  - model_name: "qwen-coder-ubuntu"
    litellm_params:
      model: "ollama/qwen2.5-coder:7b"
      api_base: "https://vessel-dicke-theorem-levitra.trycloudflare.com"
      timeout: 120

  - model_name: "deepseek-r1-8b"
    litellm_params:
      model: "ollama/deepseek-r1:8b"
      api_base: "https://vessel-dicke-theorem-levitra.trycloudflare.com"
      timeout: 180

  - model_name: "kairos-r1-14b"
    litellm_params:
      model: "ollama/kairos-r1-14b:latest"
      api_base: "https://vessel-dicke-theorem-levitra.trycloudflare.com"
      timeout: 300

  - model_name: "360-light"
    litellm_params:
      model: "ollama/360-light-local:latest"
      api_base: "https://vessel-dicke-theorem-levitra.trycloudflare.com"
      timeout: 300

  - model_name: "kairos-coder"
    litellm_params:
      model: "ollama/fervent_mcclintock/KwaiCoder-DS-V2-Lite-Base:Q4_K_M"
      api_base: "https://vessel-dicke-theorem-levitra.trycloudflare.com"
      timeout: 300

  - model_name: "gemma-4-scout-local"
    litellm_params:
      model: "ollama/gemma:2b"  # Fallback to 2b if special scout model missing locally
      api_base: "https://vessel-dicke-theorem-levitra.trycloudflare.com"
      timeout: 60

  # ── CLOUD FALLBACK ────────────────────────────────

  - model_name: "openrouter-mistral"
    litellm_params:
      model: "openrouter/mistralai/mistral-large"
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 60

  - model_name: "qwen3-coder"
    litellm_params:
      model: "openrouter/qwen/qwen-2.5-coder-32b-instruct"
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 60

  - model_name: "codestral"
    litellm_params:
      model: "openrouter/mistralai/codestral-2501"
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 60

  - model_name: "hermes-3-405b"
    litellm_params:
      model: "openrouter/nousresearch/hermes-3-llama-3.1-405b"
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 60

  - model_name: "llama-3.3-70b"
    litellm_params:
      model: "openrouter/meta-llama/llama-3.3-70b-instruct"
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 60

  - model_name: "gpt-oss-20b"
    litellm_params:
      model: "openrouter/google/gemma-2-27b-it" # Fallback mapping
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 60

  - model_name: "gemini-2.5-flash"
    litellm_params:
      model: "gemini/gemini-1.5-flash"
      api_key: "os.environ/GEMINI_API_KEY"
      timeout: 60

  - model_name: "gemma-3-27b"
    litellm_params:
      model: "openrouter/google/gemma-2-27b-it"
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 60

  - model_name: "groq-llama-3.3-70b"
    litellm_params:
      model: "groq/llama-3.3-70b-versatile"
      api_key: "os.environ/GROQ_API_KEY"
      timeout: 60

  - model_name: "github-deepseek-r1"
    litellm_params:
      model: "github/deepseek-r1"
      api_key: "os.environ/GITHUB_TOKEN"
      timeout: 120

  - model_name: "groq-qwen-qwq-32b"
    litellm_params:
      model: "groq/qwq-32b"
      api_key: "os.environ/GROQ_API_KEY"
      timeout: 120

  - model_name: "lfm-2.5-1.2b-thinking"
    litellm_params:
      model: "openrouter/liquid/lfm-3b" # Approximate fallback
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 60

  - model_name: "groq-llama-3.1-8b"
    litellm_params:
      model: "groq/llama-3.1-8b-instant"
      api_key: "os.environ/GROQ_API_KEY"
      timeout: 30

  - model_name: "github-gpt4o"
    litellm_params:
      model: "github/gpt-4o"
      api_key: "os.environ/GITHUB_TOKEN"
      timeout: 60

router_settings:
  routing_strategy: "usage-based-routing"
  num_retries: 2
  timeout: 300

general_settings:
  master_key: "sk-KAIROS"
  max_parallel_requests: 1

litellm_settings:
  drop_params: true












