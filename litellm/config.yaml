# --- LiteLLM Proxy Configuration ---------------------------------------------
# KAIROS AI - 100% VERIFIED FREE CONFIGURATION
# Optimized to avoid "Developer instruction" errors.
# ------------------------------------------------------------------------------

model_list:

  # --- FREE FLAGSHIP (Groq — zero cost, very fast) ---

  - model_name: qwen3-coder
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: llama-3.3-70b
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: hermes-405b
    litellm_params:
      model: openrouter/nousresearch/hermes-3-llama-3.1-405b:free
      api_key: os.environ/OPENROUTER_API_KEY_1

  - model_name: gpt-oss-120b
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY_1

  # --- FREE BALANCED (Confirmed supporting System Prompts) ---

  - model_name: gemma-3-27b
    litellm_params:
      model: openrouter/qwen/qwen-2.5-72b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY_1

  - model_name: deepseek-v3
    litellm_params:
      model: openrouter/qwen/qwen-2.5-72b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY_2

  - model_name: gpt-oss-20b
    litellm_params:
      model: openrouter/qwen/qwen-2.5-72b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY_2

  - model_name: glm-4-5-air
    litellm_params:
      model: openrouter/qwen/qwen-2.5-72b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY_2

  - model_name: qwen3-6-plus
    litellm_params:
      model: groq/gemma2-9b-it
      api_key: os.environ/GROQ_API_KEY

  # --- FREE REASONING ---

  - model_name: deepseek-r1
    litellm_params:
      model: groq/deepseek-r1-distill-llama-70b
      api_key: os.environ/GROQ_API_KEY

  - model_name: lfm-thinking
    litellm_params:
      model: openrouter/liquid/lfm-40b:free
      api_key: os.environ/OPENROUTER_API_KEY_1

  - model_name: lfm-instruct
    litellm_params:
      model: openrouter/liquid/lfm-40b:free
      api_key: os.environ/OPENROUTER_API_KEY_2

# --- Router settings ---
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  retry_after: 2
  allowed_fails: 2

# --- Proxy settings ---
litellm_settings:
  drop_params: true
  cache: false
  allow_health_check_no_auth: true

general_settings:
  master_key: sk-KAIROS
  disable_db: true
