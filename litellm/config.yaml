# --- KAIROS CLOUD PROXY CONFIG (RENDER ONLY) -----------------------------------
# This config runs on Render and routes local requests to the Laptop Tunnel.
# ------------------------------------------------------------------------------

model_list:

  - model_name: "kairos-r1-14b"
    litellm_params:
      model: "ollama/kairos-r1-14b:latest"
      api_base: "https://ollama.pulsyra.com"
      timeout: 600

  - model_name: "deepseek-r1-8b"
    litellm_params:
      model: "ollama/deepseek-r1:8b"
      api_base: "https://ollama.pulsyra.com"
      timeout: 300

  - model_name: "360-light"
    litellm_params:
      model: "ollama/360-light-local:latest"
      api_base: "https://ollama.pulsyra.com"
      timeout: 600

  - model_name: "kairos-coder"
    litellm_params:
      model: "ollama/fervent_mcclintock/KwaiCoder-DS-V2-Lite-Base:Q4_K_M"
      api_base: "https://ollama.pulsyra.com"

  - model_name: "qwen-coder-win"
    litellm_params:
      model: "ollama/qwen2.5-coder:7b"
      api_base: "https://ollama.pulsyra.com"

  - model_name: "gemma-local-fast"
    litellm_params:
      model: "ollama/gemma:2b"
      api_base: "https://ollama.pulsyra.com"

  # --- Cloud Fallbacks ---
  - model_name: "gpt-oss-20b"
    litellm_params:
      model: "openrouter/openai/gpt-oss-20b:free"
      api_key: "os.environ/OPENROUTER_API_KEY_1"

  - model_name: "llama-3.3-70b"
    litellm_params:
      model: "openrouter/meta-llama/llama-3.3-70b-instruct:free"
      api_key: "os.environ/OPENROUTER_API_KEY_1"

  - model_name: "openrouter-mistral"
    litellm_params:
      model: "openrouter/mistralai/pixtral-12b:free"
      api_key: "os.environ/OPENROUTER_API_KEY_1"

  - model_name: "github-gpt4o"
    litellm_params:
      model: "github/gpt-4o"
      api_key: "os.environ/GITHUB_API_KEY"

router_settings:
  routing_strategy: "usage-based-routing"
  num_retries: 2
  timeout: 30
  retry_after: 2

  # Global fallback when any model fails
  fallback_models:
    - "openrouter-mistral"
    - "github-gpt4o"

  # Per model fallbacks
  context_window_fallbacks:
    - "kairos-r1-14b":  ["openrouter-mistral"]
    - "360-light":      ["openrouter-mistral"]
    - "kairos-coder":   ["openrouter-mistral"]
    - "deepseek-r1-8b": ["openrouter-mistral"]
    - "qwen-coder-win": ["openrouter-mistral"]
    - "gemma-local-fast":["openrouter-mistral"]

litellm_settings:
  drop_params: true
  # Tell user which model actually responded
  add_model_to_completion_header: true

general_settings:
  no_auth: true
  disable_spend_logs: true
