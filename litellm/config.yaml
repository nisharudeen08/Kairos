# --- Router settings ---
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 5
  retry_after: 3
  allowed_fails: 3

# --- Proxy settings ---
litellm_settings:
  drop_params: true
  cache: false
  allow_health_check_no_auth: true

general_settings:
  master_key: sk-KAIROS
  disable_db: true
