model_list:

  # ── ALL ON WINDOWS via Cloudflare Tunnel ──────────

  - model_name: "gemma-local-fast"
    litellm_params:
      model: "ollama/b50d6c999e59" # gemma:2b
      api_base: "https://ollama.pulsyra.com"
      timeout: 60

  - model_name: "qwen-coder-ubuntu"
    litellm_params:
      model: "ollama/dae161e27b0e" # qwen2.5-coder:7b
      api_base: "https://ollama.pulsyra.com"
      timeout: 120
      fallbacks: ["ollama/6995872bfe4c"]

  - model_name: "deepseek-r1-8b"
    litellm_params:
      model: "ollama/6995872bfe4c" # deepseek-r1:8b
      api_base: "https://ollama.pulsyra.com"
      timeout: 180
      timeout: 180

  - model_name: "kairos-r1-14b"
    litellm_params:
      model: "ollama/24e632f0397f" # kairos-r1-14b
      api_base: "https://ollama.pulsyra.com"
      timeout: 300
      fallbacks: ["ollama/6995872bfe4c"]

  - model_name: "360-light"
    litellm_params:
      model: "ollama/ba2904cf5a2f" # 360-light
      api_base: "https://ollama.pulsyra.com"
      timeout: 300
      fallbacks: ["ollama/6995872bfe4c"]

  - model_name: "kairos-coder"
    litellm_params:
      model: "ollama/f28929c8cd75" # kwaicoder
      api_base: "https://ollama.pulsyra.com"
      timeout: 300
      fallbacks: ["ollama/6995872bfe4c"]

  - model_name: "gemma-4-scout-local"
    litellm_params:
      model: "ollama/gemma:2b"  # Fallback to 2b if special scout model missing locally
      api_base: "https://ollama.pulsyra.com"
      timeout: 60

  # ── CLOUD FALLBACK ────────────────────────────────

  - model_name: "mistral-large"
    litellm_params:
      model: "mistral/mistral-large-latest"
      api_key: "os.environ/MISTRAL_API_KEY"
      timeout: 60


  - model_name: "codestral"
    litellm_params:
      model: "mistral/codestral-latest"
      api_key: "os.environ/MISTRAL_API_KEY"
      timeout: 60


  - model_name: "llama-3.3-70b"
    litellm_params:
      model: "openrouter/meta-llama/llama-3.3-70b-instruct"
      api_key: "os.environ/OPENROUTER_API_KEY_1"
      timeout: 60

  - model_name: "groq-llama-3.3-70b"
    litellm_params:
      model: "groq/llama-3.3-70b-versatile"
      api_key: "os.environ/GROQ_API_KEY"
      timeout: 60

  - model_name: "github-deepseek-r1"
    litellm_params:
      model: "github/deepseek-r1"
      api_key: "os.environ/GITHUB_API_KEY"
      timeout: 120

  - model_name: "groq-qwen-qwq-32b"
    litellm_params:
      model: "groq/qwq-32b"
      api_key: "os.environ/GROQ_API_KEY"
      timeout: 120

  - model_name: "lfm-2.5-1.2b-thinking"
    litellm_params:
      model: "openrouter/liquid/lfm-3b" # Approximate fallback
      api_key: "os.environ/OPENROUTER_API_KEY_1"
      timeout: 60

  - model_name: "groq-llama-3.1-8b"
    litellm_params:
      model: "groq/llama-3.1-8b-instant"
      api_key: "os.environ/GROQ_API_KEY"
      timeout: 30

  - model_name: "github-gpt4o"
    litellm_params:
      model: "github/gpt-4o"
      api_key: "os.environ/GITHUB_API_KEY"
      timeout: 60

router_settings:
  routing_strategy: "usage-based-routing"
  num_retries: 2
  timeout: 300

general_settings:
  master_key: "sk-KAIROS"
  max_parallel_requests: 1

litellm_settings:
  drop_params: true












