model_list:

  # ── ALL ON WINDOWS via Cloudflare Tunnel ──────────

  - model_name: "gemma-local-fast"
    litellm_params:
      model: "ollama/gemma:2b"
      api_base: "https://conscious-victoria-behavioral-larger.trycloudflare.com"
      timeout: 60

  - model_name: "qwen-coder-win"
    litellm_params:
      model: "ollama/qwen2.5-coder:7b"
      api_base: "https://conscious-victoria-behavioral-larger.trycloudflare.com"
      timeout: 120

  - model_name: "deepseek-r1-8b"
    litellm_params:
      model: "ollama/deepseek-r1:8b"
      api_base: "https://conscious-victoria-behavioral-larger.trycloudflare.com"
      timeout: 180

  - model_name: "kairos-r1-14b"
    litellm_params:
      model: "ollama/kairos-r1-14b:latest"
      api_base: "https://conscious-victoria-behavioral-larger.trycloudflare.com"
      timeout: 300

  - model_name: "360-light"
    litellm_params:
      model: "ollama/360-light-local:latest"
      api_base: "https://conscious-victoria-behavioral-larger.trycloudflare.com"
      timeout: 300

  - model_name: "kairos-coder"
    litellm_params:
      model: "ollama/fervent_mcclintock/KwaiCoder:Q4_K_M"
      api_base: "https://conscious-victoria-behavioral-larger.trycloudflare.com"
      timeout: 300

  # ── UBUNTU — qwen only ────────────────────────────

  # DISABLED — Ubuntu tunnel URL pending
  # - model_name: "qwen-coder-ubuntu"
  #   litellm_params:
  #     model: "ollama/qwen2.5-coder:7b"
  #     api_base: "https://UBUNTU-TUNNEL-URL"
  #     timeout: 120

  # ── CLOUD FALLBACK ────────────────────────────────

  - model_name: "openrouter-mistral"
    litellm_params:
      model: "openrouter/mistralai/mistral-large"
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 60

  - model_name: "github-gpt4o"
    litellm_params:
      model: "github/gpt-4o"
      api_key: "os.environ/GITHUB_TOKEN"
      timeout: 60

router_settings:
  routing_strategy: "usage-based-routing"
  num_retries: 2
  timeout: 300
  fallback_models:
    - "openrouter-mistral"
    - "github-gpt4o"

general_settings:
  master_key: "sk-KAIROS"
  max_parallel_requests: 1

litellm_settings:
  drop_params: true
