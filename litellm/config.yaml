# --- Kairos Final Stable Configuration -------------------------------------------
# D: DRIVE MASTER — Synced with JetBrains & VS Code model IDs
# Local models use CPU+GPU hybrid to fit within RTX 3050 4GB VRAM
# ---------------------------------------------------------------------------------

model_list:

  # ─── LOCAL MODELS (CPU+GPU hybrid for RTX 3050 4GB) ──────────────────────────

  - model_name: "gemma-local-fast"
    litellm_params:
      model: "ollama/gemma:2b"
      api_base: "https://local-ai.pulsyra.com"
      timeout: 60

  - model_name: "deepseek-r1-8b"
    litellm_params:
      model: "ollama/deepseek-r1:8b"
      api_base: "https://local-ai.pulsyra.com"
      timeout: 300
      # Force partial CPU offload — prevents VRAM crash on 4GB GPU
      extra_body:
        options:
          num_gpu: 20
          num_ctx: 2048

  - model_name: "qwen-coder-win"
    litellm_params:
      model: "ollama/qwen2.5-coder:7b"
      api_base: "https://local-ai.pulsyra.com"
      timeout: 300
      extra_body:
        options:
          num_gpu: 20
          num_ctx: 2048

  - model_name: "360-light"
    litellm_params:
      model: "ollama/360-light-local:latest"
      api_base: "https://local-ai.pulsyra.com"
      timeout: 600
      extra_body:
        options:
          num_gpu: 15
          num_ctx: 2048

  - model_name: "kairos-r1-14b"
    litellm_params:
      model: "ollama/kairos-r1-14b:latest"
      api_base: "https://local-ai.pulsyra.com"
      timeout: 600
      extra_body:
        options:
          num_gpu: 15
          num_ctx: 2048

  - model_name: "kairos-coder"
    litellm_params:
      model: "ollama/fervent_mcclintock/KwaiCoder-DS-V2-Lite-Base:Q4_K_M"
      api_base: "https://local-ai.pulsyra.com"
      timeout: 600
      extra_body:
        options:
          num_gpu: 15
          num_ctx: 2048

  # ─── CLOUD MODELS (Always reliable) ──────────────────────────────────────────

  - model_name: "gpt-oss-20b"
    litellm_params:
      model: "openrouter/openai/gpt-oss-20b:free"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY_1"

  - model_name: "llama-3.3-70b"
    litellm_params:
      model: "openrouter/meta-llama/llama-3.3-70b-instruct:free"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY_1"

  - model_name: "gemini-2.5-flash"
    litellm_params:
      model: "gemini/gemini-2.5-flash"
      api_key: "os.environ/GEMINI_API_KEY"

  - model_name: "groq-llama-3.1-8b"
    litellm_params:
      model: "groq/llama-3.1-8b-instant"
      api_key: "os.environ/GROQ_API_KEY"

  - model_name: "groq-llama-3.3-70b"
    litellm_params:
      model: "groq/llama-3.3-70b-versatile"
      api_key: "os.environ/GROQ_API_KEY"

  - model_name: "codestral"
    litellm_params:
      model: "mistral/codestral-latest"
      api_key: "os.environ/MISTRAL_API_KEY"

  - model_name: "groq-qwen-qwq-32b"
    litellm_params:
      model: "groq/qwen-qwq-32b"
      api_key: "os.environ/GROQ_API_KEY"

  - model_name: "github-deepseek-r1"
    litellm_params:
      model: "github/DeepSeek-R1"
      api_key: "os.environ/GITHUB_API_KEY"

  - model_name: "github-gpt4o"
    litellm_params:
      model: "github/gpt-4o"
      api_key: "os.environ/GITHUB_API_KEY"

  - model_name: "mistral-large"
    litellm_params:
      model: "mistral/mistral-large-latest"
      api_key: "os.environ/MISTRAL_API_KEY"

  - model_name: "lfm-2.5-1.2b-thinking"
    litellm_params:
      model: "openrouter/liquid/lfm-2.5-1.2b-thinking:free"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY_2"

# --- Router ---
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3

# --- General ---
general_settings:
  no_auth: true
  disable_spend_logs: true

litellm_settings:
  drop_params: true
