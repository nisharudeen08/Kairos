<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Antigravity AI - Chat Panel</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#c7b545",
                    "surface-bright": "#393939",
                    "surface-container-lowest": "#0e0e0e",
                    "inverse-surface": "#e4e2e1",
                    "surface-dim": "#131313",
                    "on-secondary": "#322c4a",
                    "primary-fixed-dim": "#cabeff",
                    "on-secondary-fixed-variant": "#484362",
                    "on-primary-container": "#483a87",
                    "secondary-fixed-dim": "#cac2e7",
                    "surface-variant": "#353535",
                    "tertiary-fixed-dim": "#dac755",
                    "on-primary-fixed-variant": "#493a88",
                    "primary-container": "#b8a9ff",
                    "surface-tint": "#cabeff",
                    "primary": "#d4c9ff",
                    "tertiary-fixed": "#f8e46e",
                    "inverse-primary": "#6153a2",
                    "tertiary": "#e4d15e",
                    "secondary-container": "#4b4564",
                    "surface-container-low": "#1b1c1c",
                    "inverse-on-surface": "#303030",
                    "on-surface": "#e4e2e1",
                    "surface": "#131313",
                    "secondary": "#cac2e7",
                    "surface-container-high": "#2a2a2a",
                    "outline-variant": "#484550",
                    "on-tertiary-container": "#504600",
                    "on-primary": "#322270",
                    "error": "#ffb4ab",
                    "secondary-fixed": "#e6deff",
                    "on-tertiary": "#383100",
                    "error-container": "#93000a",
                    "primary-fixed": "#e6deff",
                    "surface-container-highest": "#353535",
                    "surface-container": "#1f2020",
                    "on-primary-fixed": "#1c055b",
                    "on-surface-variant": "#c9c4d2",
                    "on-secondary-fixed": "#1c1734",
                    "on-error": "#690005",
                    "on-error-container": "#ffdad6",
                    "on-tertiary-fixed": "#201c00",
                    "outline": "#938f9c",
                    "on-tertiary-fixed-variant": "#514700",
                    "on-secondary-container": "#bbb4d9",
                    "background": "#131313",
                    "on-background": "#e4e2e1"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Poppins", "Plus Jakarta Sans"],
                    "body": ["Poppins", "Plus Jakarta Sans"],
                    "label": ["Poppins", "Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
    <style>
        body { font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
            font-size: 18px;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #353535; border-radius: 10px; }

        #messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; padding: 16px; scroll-behavior: smooth; }
        .message { max-width: 90%; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; }
        .message.agent { align-self: flex-start; width: 100%; }
        .bubble-user { background: #323232; color: #e4e2e1; padding: 10px 14px; border-radius: 14px 14px 2px 14px; border: 1px solid #3d3d3d; font-size: 13px; }
        .bubble-agent { background: #1f2020; border: 1px solid #353535; padding: 14px; border-radius: 14px 14px 14px 2px; width: 100%; }
        .msg-content { font-size: 13px; line-height: 1.6; color: #c9c4d2; }
        .msg-content p { margin-bottom: 8px; }
        .msg-content p:last-child { margin-bottom: 0; }
        .msg-content code { background: #2a2a2a; padding: 2px 4px; border-radius: 4px; color: #cabeff; font-family: monospace; font-size: 12px; }
        .msg-content pre { background: #0e0e0e; border: 1px solid #353535; border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }
        .cursor { display: inline-block; width: 2px; height: 14px; background: #cabeff; margin-left: 2px; vertical-align: middle; animation: blink 1s step-end infinite; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen p-3 flex flex-col gap-3">
    <div id="panel" class="flex flex-col flex-1 rounded-2xl overflow-hidden glass-panel bg-[#0a0d1a]/90 backdrop-blur-xl border border-white/10 shadow-2xl">
        <!-- Top Bar -->
        <div id="top-bar" class="flex items-center justify-between px-5 py-4 border-b border-white/5 bg-white/2">
          <div id="title-group" class="flex flex-col">
            <p class="text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-0.5">Antigravity AI</p>
            <h1 class="text-sm font-bold text-white flex items-center gap-2">
              JetBrains Session
              <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 shadow-[0_0_8px_#6366f1]"></span>
            </h1>
          </div>
          <div class="flex items-center gap-2">
            <button id="btn-settings" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white/5 border border-white/10 text-slate-400 hover:text-white hover:bg-white/10 transition-colors">
              <span class="material-symbols-outlined text-[18px]">tune</span>
            </button>
          </div>
        </div>

        <!-- Chat Area -->
        <div id="messages" class="custom-scrollbar flex-1 overflow-y-auto p-5 space-y-6">
            <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center max-w-[280px] mx-auto space-y-4">
                <div class="w-16 h-16 rounded-3xl bg-primary/10 border border-primary/20 flex items-center justify-center text-primary shadow-2xl shadow-primary/10">
                  <span class="material-symbols-outlined text-[32px]">auto_awesome</span>
                </div>
                <div class="space-y-1">
                  <h2 class="text-white font-bold text-sm">How can I help you?</h2>
                  <p class="text-[12px] text-slate-400 leading-relaxed font-light">Ask me about your code, or let me help you build something new.</p>
                </div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="p-4 border-t border-white/5 bg-white/2">
            <div id="input-box" class="relative flex flex-col gap-3 p-3 rounded-2xl bg-[#1a1b26]/70 border border-white/10 focus-within:border-primary/40 focus-within:bg-[#1a1b26]/90 transition-all shadow-inner">
                <!-- Input wrapper -->
                <textarea 
                  id="user-input" 
                  placeholder="Ask anything..." 
                  rows="1" 
                  class="w-full bg-transparent border-none focus:ring-0 text-[13px] text-slate-200 placeholder-slate-500 resize-none min-h-[44px] max-h-[120px] py-1 custom-scrollbar"
                ></textarea>

                <!-- Bottom Bar (Pill Row) -->
                <div class="flex items-center justify-between gap-2 pt-1">
                    <div class="flex items-center flex-wrap gap-2 flex-1">
                        <!-- File Upload -->
                        <button id="btn-file-upload" title="Attach file" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-500 hover:text-white hover:bg-white/5 transition-all">
                            <span class="material-symbols-outlined text-[20px]">add_circle</span>
                        </button>
                        <input type="file" id="file-input" multiple style="display: none;" />

                        <div class="h-4 w-px bg-white/10 mx-1"></div>

                        <!-- Mode Selector -->
                        <div class="relative group">
                            <div id="mode-selector-btn" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-indigo-500/10 border border-indigo-500/20 text-[10px] font-bold text-indigo-400 cursor-pointer hover:bg-indigo-500/20 transition-all uppercase tracking-wider">
                                <span class="material-symbols-outlined text-[14px]">bolt</span>
                                <span id="mode-text">Fast</span>
                                <span class="material-symbols-outlined text-[12px] opacity-50 transition-opacity">expand_more</span>
                            </div>
                            <!-- Dropdown -->
                            <div id="mode-dropdown" class="hidden absolute bottom-full mb-2 left-0 w-48 rounded-xl bg-[#1a1b26] border border-white/10 shadow-2xl z-50 overflow-hidden">
                                <div class="p-1" id="mode-list"></div>
                            </div>
                        </div>

                        <!-- Model Selector -->
                        <div class="relative group">
                            <div id="model-selector-btn" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-white/5 border border-white/10 text-[10px] font-bold text-slate-400 cursor-pointer hover:bg-white/10 transition-all uppercase tracking-wider">
                                <span class="material-symbols-outlined text-[14px]">neurology</span>
                                <span id="model-text">Qwen 3.0</span>
                                <span class="material-symbols-outlined text-[12px] opacity-50 transition-opacity">expand_more</span>
                            </div>
                            <!-- Dropdown -->
                            <div id="model-dropdown" class="hidden absolute bottom-full mb-2 left-0 w-64 rounded-xl bg-[#1a1b26] border border-white/10 shadow-2xl z-50 overflow-hidden">
                                <div class="p-1" id="model-list"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Send/Action Button -->
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <button id="btn-send" class="w-9 h-9 flex items-center justify-center rounded-xl bg-primary text-slate-900 border-none hover:scale-105 active:scale-95 transition-all shadow-[0_0_15px_rgba(184,169,255,0.3)] disabled:opacity-50">
                            <span class="material-symbols-outlined text-[20px] font-bold">arrow_upward</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="chat.js"></script>
</body>
</html>
